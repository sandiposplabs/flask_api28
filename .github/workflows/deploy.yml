name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  AZURE_CONTAINER_APP_NAME: flask-api-app
  AZURE_RESOURCE_GROUP: rg-badar
  AZURE_CONTAINER_REGISTRY: badaracregistry.azurecr.io
  IMAGE_NAME: flask-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # FIXED: correct ACR login
      - name: Login to ACR
        run: |
          az acr login --name badaracregistry

      - name: Build Docker image
        run: |
          docker build -t $AZURE_CONTAINER_REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $AZURE_CONTAINER_REGISTRY/$IMAGE_NAME:${{ github.sha }}

      # IMPORTANT FIX: force new revision update
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name $AZURE_CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image $AZURE_CONTAINER_REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            --set-env-vars "RESTART_TRIGGER=${{ github.sha }}"
